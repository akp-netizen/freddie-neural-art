<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddie's Spelling Game</title>
<style>
  :root {
    --blue: #2563EB;
    --blue-light: #DBEAFE;
    --blue-dark: #1D4ED8;
    --green: #059669;
    --green-light: #D1FAE5;
    --red: #DC2626;
    --yellow: #D97706;
    --yellow-light: #FEF3C7;
    --purple: #7C3AED;
    --bg: #F0F9FF;
    --dark: #1E293B;
    --mid: #64748B;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  /* ── HEADER ── */
  .header { background: linear-gradient(135deg, #1D4ED8, #2563EB); color: white; padding: 20px; text-align: center; }
  .header h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; margin-bottom: 4px; }
  .header p { font-size: 0.88rem; opacity: 0.85; }
  .xp-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 99px; height: 12px; margin: 14px auto 0; max-width: 320px; overflow: hidden; }
  .xp-bar { background: #FCD34D; height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .xp-label { font-size: 0.75rem; opacity: 0.85; margin-top: 6px; font-weight: 700; }
  .streak-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0.9; }

  /* ── NAV ── */
  .nav { display: flex; gap: 8px; justify-content: center; padding: 12px 16px; background: white; border-bottom: 2px solid #E2E8F0; flex-wrap: wrap; }
  .nav a { font-size: 0.75rem; font-weight: 700; color: var(--mid); text-decoration: none; padding: 8px 14px; border-radius: 99px; border: 2px solid #E2E8F0; transition: all 0.2s; min-height: 40px; display: flex; align-items: center; }
  .nav a:hover { border-color: var(--blue); color: var(--blue); }
  .nav a.current { background: var(--blue); color: white; border-color: var(--blue); }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME SCREEN ── */
  .home-wrap { max-width: 500px; margin: 0 auto; padding: 28px 16px; }

  .big-btn { width: 100%; border: none; border-radius: 20px; padding: 24px; cursor: pointer; transition: all 0.2s; margin-bottom: 14px; display: flex; align-items: center; gap: 20px; text-align: left; min-height: 90px; }
  .big-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .big-btn .btn-icon { font-size: 2.4rem; flex-shrink: 0; }
  .big-btn h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 3px; }
  .big-btn p { font-size: 0.8rem; opacity: 0.75; }
  .btn-play { background: linear-gradient(135deg, #2563EB, #1D4ED8); color: white; }
  .btn-blitz { background: linear-gradient(135deg, #D97706, #B45309); color: white; }
  .btn-edit { background: white; color: var(--dark); border: 2px solid #E2E8F0; }

  .word-count-badge { background: var(--blue-light); color: var(--blue-dark); border-radius: 12px; padding: 12px 16px; text-align: center; font-size: 0.88rem; font-weight: 700; margin-bottom: 20px; }

  /* ── GAME SCREEN ── */
  .game-wrap { max-width: 500px; margin: 0 auto; padding: 20px 16px 40px; }

  .progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #E2E8F0; transition: all 0.3s; }
  .dot.done { background: var(--green); }
  .dot.current { background: var(--blue); transform: scale(1.3); }

  .word-card { background: white; border-radius: 24px; padding: 28px 24px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; border: 3px solid #E2E8F0; transition: border-color 0.3s; }
  .word-card.correct { border-color: var(--green); background: var(--green-light); }
  .word-card.wrong { border-color: #FCA5A5; background: #FEF2F2; }

  .word-number { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--mid); margin-bottom: 12px; }

  .speak-btn { background: var(--blue); color: white; border: none; border-radius: 99px; padding: 16px 32px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; min-height: 56px; margin-bottom: 20px; }
  .speak-btn:hover { background: var(--blue-dark); transform: scale(1.03); }
  .speak-btn.speaking { background: var(--purple); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .hint-btn { background: none; border: 2px solid #E2E8F0; border-radius: 99px; padding: 10px 20px; font-size: 0.82rem; font-weight: 700; color: var(--mid); cursor: pointer; transition: all 0.2s; margin-bottom: 20px; min-height: 44px; }
  .hint-btn:hover { border-color: var(--yellow); color: var(--yellow); }

  /* ── ANSWER DISPLAY ── */
  .answer-slots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; min-height: 68px; align-items: center; }
  .answer-slot { width: 52px; height: 62px; border: 3px solid #CBD5E1; border-radius: 12px; background: #F8FAFC; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: var(--dark); cursor: pointer; transition: all 0.2s; position: relative; }
  .answer-slot:hover { border-color: var(--blue); }
  .answer-slot.filled { background: var(--blue-light); border-color: var(--blue); }
  .answer-slot.correct-slot { background: var(--green-light); border-color: var(--green); }
  .answer-slot.wrong-slot { background: #FEF2F2; border-color: #FCA5A5; animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ── LETTER TILES ── */
  .letter-tiles { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .tile { width: 58px; height: 68px; border: 3px solid #CBD5E1; border-radius: 14px; background: white; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; font-weight: 900; cursor: pointer; transition: all 0.15s; color: var(--dark); box-shadow: 0 3px 8px rgba(0,0,0,0.08); user-select: none; }
  .tile:hover { border-color: var(--blue); background: var(--blue-light); transform: translateY(-3px); box-shadow: 0 6px 16px rgba(37,99,235,0.2); }
  .tile:active { transform: translateY(0); }
  .tile.used { opacity: 0.25; pointer-events: none; transform: none; }

  .clear-btn { background: none; border: 2px solid #FCA5A5; border-radius: 99px; padding: 10px 22px; font-size: 0.82rem; font-weight: 700; color: var(--red); cursor: pointer; transition: all 0.2s; min-height: 44px; margin-right: 10px; }
  .clear-btn:hover { background: #FEF2F2; }

  .check-btn { background: var(--green); color: white; border: none; border-radius: 99px; padding: 12px 28px; font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: all 0.2s; min-height: 48px; }
  .check-btn:hover { background: #047857; transform: scale(1.03); }

  .action-row { display: flex; justify-content: center; align-items: center; gap: 0; margin-bottom: 16px; }

  /* ── RESULT MESSAGE ── */
  .result-msg { text-align: center; padding: 16px; border-radius: 14px; font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: none; }
  .result-msg.show { display: block; }
  .result-msg.correct { background: var(--green-light); color: var(--green); }
  .result-msg.wrong { background: #FEF2F2; color: var(--red); }

  .next-btn { width: 100%; background: var(--blue); color: white; border: none; border-radius: 99px; padding: 18px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; min-height: 60px; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--blue-dark); }

  /* ── SCORE SCREEN ── */
  .score-wrap { max-width: 500px; margin: 0 auto; padding: 40px 16px; text-align: center; }
  .score-emoji { font-size: 5rem; margin-bottom: 16px; }
  .score-wrap h2 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
  .score-wrap p { font-size: 1rem; color: var(--mid); margin-bottom: 28px; }
  .score-breakdown { background: white; border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; }
  .score-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F1F5F9; font-size: 0.9rem; }
  .score-row:last-child { border: none; }
  .score-row .word { font-weight: 700; }
  .score-row .result { font-size: 1.2rem; }
  .play-again-btn { background: var(--blue); color: white; border: none; border-radius: 99px; padding: 18px 40px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; min-height: 60px; width: 100%; margin-bottom: 12px; }
  .play-again-btn:hover { background: var(--blue-dark); }
  .home-link-btn { background: white; color: var(--dark); border: 2px solid #E2E8F0; border-radius: 99px; padding: 14px 40px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; min-height: 52px; width: 100%; }

  /* ── EDIT SCREEN ── */
  .edit-wrap { max-width: 500px; margin: 0 auto; padding: 24px 16px 40px; }
  .edit-wrap h2 { font-size: 1.3rem; font-weight: 900; margin-bottom: 6px; }
  .edit-wrap p { font-size: 0.85rem; color: var(--mid); margin-bottom: 20px; }
  .word-input-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .word-input-row { display: flex; gap: 10px; align-items: center; }
  .word-input-row input { flex: 1; border: 2px solid #E2E8F0; border-radius: 12px; padding: 14px 16px; font-size: 1rem; font-weight: 700; color: var(--dark); background: white; min-height: 52px; outline: none; transition: border-color 0.2s; text-transform: lowercase; }
  .word-input-row input:focus { border-color: var(--blue); }
  .word-input-row .del-btn { width: 44px; height: 44px; border: 2px solid #FCA5A5; border-radius: 50%; background: none; color: var(--red); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-word-btn { background: var(--blue-light); color: var(--blue-dark); border: 2px dashed var(--blue); border-radius: 12px; padding: 14px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; min-height: 52px; transition: all 0.2s; margin-bottom: 20px; }
  .add-word-btn:hover { background: var(--blue); color: white; }
  .save-btn { background: var(--green); color: white; border: none; border-radius: 99px; padding: 18px; font-size: 1rem; font-weight: 800; cursor: pointer; width: 100%; min-height: 60px; transition: all 0.2s; }
  .save-btn:hover { background: #047857; }

  /* ── CONFETTI ── */
  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; top: -10px; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* ── HINT DISPLAY ── */
  .hint-display { background: var(--yellow-light); border: 2px solid var(--yellow); border-radius: 12px; padding: 12px 16px; font-size: 0.9rem; color: #92400E; font-weight: 600; margin-bottom: 16px; display: none; text-align: center; }
  .hint-display.show { display: block; }
</style>
</head>

</div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <h1>📝 Spelling Game</h1>
    <p>Tap the letters. Hear the word. Zero writing needed.</p>
    <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    <div class="xp-label" id="xp-label">0 XP total</div>
    <div class="streak-bar">🔥 <span id="streak-display">0 day streak</span></div>
  </div>
  <div class="home-wrap">
    <div class="word-count-badge" id="word-count-badge">📚 Loading word list...</div>
    <button class="big-btn btn-play" onclick="startGame('normal')">
      <div class="btn-icon">🎮</div>
      <div><h3>Practice Round</h3><p>5 random words · Take your time · No pressure</p></div>
    </button>
    <button class="big-btn btn-blitz" onclick="startGame('blitz')">
      <div class="btn-icon">⚡</div>
      <div><h3>Speed Blitz</h3><p>All words · Race the clock · Max XP</p></div>
    </button>
    <button class="big-btn btn-edit" onclick="showEdit()">
      <div class="btn-icon">✏️</div>
      <div><h3>Edit Word List</h3><p>Update this week's spelling words</p></div>
    </button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-wrap">
    <div class="progress-dots" id="progress-dots"></div>
    <div class="word-card" id="word-card">
      <div class="word-number" id="word-number">Word 1 of 5</div>
      <button class="speak-btn" id="speak-btn" onclick="speakWord()">
        🔊 Hear the word
      </button>
      <button class="hint-btn" id="hint-btn" onclick="showHint()">💡 Show me a hint</button>
      <div class="hint-display" id="hint-display"></div>
    </div>
    <div class="answer-slots" id="answer-slots"></div>
    <div class="letter-tiles" id="letter-tiles"></div>
    <div class="action-row">
      <button class="clear-btn" onclick="clearAnswer()">✖ Clear</button>
      <button class="check-btn" onclick="checkAnswer()">✓ Check it!</button>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <button class="next-btn" id="next-btn" onclick="nextWord()">Next word →</button>
  </div>
</div>

<!-- SCORE -->
<div id="screen-score" class="screen">
  <div class="score-wrap">
    <div class="score-emoji" id="score-emoji">🎉</div>
    <h2 id="score-title">Nice work!</h2>
    <p id="score-subtitle">Here's how you did:</p>
    <div class="score-breakdown" id="score-breakdown"></div>
    <button class="play-again-btn" onclick="startGame('normal')">🎮 Play Again</button>
    <button class="home-link-btn" onclick="showHome()">← Back to Home</button>
  </div>
</div>

<!-- EDIT -->
<div id="screen-edit" class="screen">
  <div class="edit-wrap">
    <button class="back-btn" style="background:none;border:2px solid #E2E8F0;border-radius:99px;padding:12px 22px;font-size:0.88rem;font-weight:700;cursor:pointer;margin-bottom:20px;color:#1E293B;min-height:48px;display:inline-flex;align-items:center;" onclick="showHome()">← Back</button>
    <h2>✏️ This Week's Words</h2>
    <p>Type up to 15 spelling words. Freddie won't see this screen.</p>
    <div class="word-input-list" id="word-input-list"></div>
    <button class="add-word-btn" onclick="addWordInput()">+ Add another word</button>
    <button class="save-btn" onclick="saveWords()">💾 Save Word List</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
// ── STATE ──
const STORAGE_KEY = 'freddie_spelling';
let state = {
  words: ['because','friend','together','different','important','actually','probably','remember','beautiful','something'],
  xp: 0,
  streak: 0,
  lastPlayed: null,
  totalCorrect: 0
};

// ── GAME STATE ──
let sessionWords = [];
let currentIndex = 0;
let currentAnswer = [];
let scrambledLetters = [];
let sessionResults = [];
let gameMode = 'normal';
let hintsUsed = 0;

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = {...state, ...JSON.parse(s)}; } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── STREAK ──
function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastPlayed === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastPlayed === yesterday) { state.streak++; }
  else if (state.lastPlayed !== today) { state.streak = 1; }
  state.lastPlayed = today;
  saveState();
}

// ── HOME ──
function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
  const total = state.words.length;
  document.getElementById('word-count-badge').textContent = `📚 ${total} word${total!==1?'s':''} loaded this week`;
  document.getElementById('xp-label').textContent = `${state.xp} XP total · ${state.totalCorrect} words mastered`;
  document.getElementById('xp-bar').style.width = Math.min((state.xp / 500) * 100, 100) + '%';
  document.getElementById('streak-display').textContent = `${state.streak} day streak`;
  window.scrollTo(0,0);
}

// ── GAME ──
function startGame(mode) {
  gameMode = mode;
  updateStreak();
  const words = [...state.words].filter(w => w.trim().length > 0);
  if (words.length === 0) { alert("No words yet! Tap 'Edit Word List' to add this week's words."); return; }
  sessionWords = mode === 'blitz' ? shuffle([...words]) : shuffle([...words]).slice(0, Math.min(5, words.length));
  currentIndex = 0;
  sessionResults = [];
  hintsUsed = 0;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-game').classList.add('active');
  renderProgressDots();
  loadWord();
  window.scrollTo(0,0);
}

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function loadWord() {
  const word = sessionWords[currentIndex];
  currentAnswer = new Array(word.length).fill(null);
  scrambledLetters = shuffle(word.split(''));
  hintsUsed = 0;

  document.getElementById('word-number').textContent = `Word ${currentIndex+1} of ${sessionWords.length}`;
  document.getElementById('word-card').className = 'word-card';
  document.getElementById('speak-btn').className = 'speak-btn';
  document.getElementById('speak-btn').textContent = '🔊 Hear the word';
  document.getElementById('hint-display').className = 'hint-display';
  document.getElementById('hint-display').textContent = '';
  document.getElementById('result-msg').className = 'result-msg';
  document.getElementById('next-btn').className = 'next-btn';

  renderAnswerSlots();
  renderLetterTiles();
  renderProgressDots();

  // Auto-speak after short delay
  setTimeout(() => speakWord(), 600);
}

function renderProgressDots() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = sessionWords.map((_,i) => {
    let cls = 'dot';
    if (i < currentIndex) cls += ' done';
    else if (i === currentIndex) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderAnswerSlots() {
  const word = sessionWords[currentIndex];
  const slots = document.getElementById('answer-slots');
  slots.innerHTML = word.split('').map((_, i) => {
    const letter = currentAnswer[i];
    return `<div class="answer-slot ${letter ? 'filled' : ''}" id="slot-${i}" onclick="removeFromSlot(${i})">
      ${letter ? `<span>${letter.toUpperCase()}</span>` : ''}
    </div>`;
  }).join('');
}

function renderLetterTiles() {
  const tiles = document.getElementById('letter-tiles');
  tiles.innerHTML = scrambledLetters.map((letter, i) => {
    const used = currentAnswer.includes(letter) && currentAnswer.indexOf(letter) !== -1;
    // Track which tiles are used
    const usedCount = currentAnswer.filter(l => l === letter).length;
    const totalCount = scrambledLetters.filter(l => l === letter).length;
    const availableCount = totalCount - usedCount;
    const tileUsed = i >= (scrambledLetters.length - availableCount) && usedCount > 0;
    return `<div class="tile ${isLetterUsedAtIndex(i) ? 'used' : ''}" id="tile-${i}" onclick="tapTile(${i}, '${letter}')">${letter.toUpperCase()}</div>`;
  }).join('');
}

// Track which tile indices are used
let usedTileIndices = [];

function tapTile(index, letter) {
  if (usedTileIndices.includes(index)) return;
  const firstEmpty = currentAnswer.indexOf(null);
  if (firstEmpty === -1) return;
  currentAnswer[firstEmpty] = letter;
  usedTileIndices.push(index);
  document.getElementById(`tile-${index}`).classList.add('used');
  renderAnswerSlots();
  // Auto-check when all slots filled
  if (!currentAnswer.includes(null)) {
    setTimeout(() => checkAnswer(), 300);
  }
}

function isLetterUsedAtIndex(tileIndex) {
  return usedTileIndices.includes(tileIndex);
}

function removeFromSlot(slotIndex) {
  const letter = currentAnswer[slotIndex];
  if (!letter) return;
  // Find the tile index that matches this letter and is used
  const tileToRestore = usedTileIndices.find(ti => scrambledLetters[ti] === letter);
  if (tileToRestore !== undefined) {
    usedTileIndices = usedTileIndices.filter(ti => ti !== tileToRestore);
    const tile = document.getElementById(`tile-${tileToRestore}`);
    if (tile) tile.classList.remove('used');
  }
  currentAnswer[slotIndex] = null;
  // Shift remaining letters left
  const nonNull = currentAnswer.filter(l => l !== null);
  currentAnswer = [...nonNull, ...new Array(currentAnswer.length - nonNull.length).fill(null)];
  renderAnswerSlots();
}

function clearAnswer() {
  currentAnswer = new Array(sessionWords[currentIndex].length).fill(null);
  usedTileIndices = [];
  renderAnswerSlots();
  renderLetterTiles();
}

function checkAnswer() {
  const word = sessionWords[currentIndex];
  const attempt = currentAnswer.join('').toLowerCase();
  if (attempt.length < word.length || currentAnswer.includes(null)) return;

  const correct = attempt === word.toLowerCase();
  const card = document.getElementById('word-card');
  const msg = document.getElementById('result-msg');
  const nextBtn = document.getElementById('next-btn');
  const slots = document.querySelectorAll('.answer-slot');

  if (correct) {
    card.className = 'word-card correct';
    slots.forEach(s => s.classList.add('correct-slot'));
    msg.className = 'result-msg correct show';
    const praise = ['🎉 YES! Nailed it!','⭐ Perfect!','🔥 That\'s it!','💥 Boom! Correct!','🏆 Got it!'];
    msg.textContent = praise[Math.floor(Math.random() * praise.length)];
    const xpGain = hintsUsed === 0 ? 20 : 10;
    state.xp += xpGain;
    state.totalCorrect++;
    saveState();
    sessionResults.push({ word, correct: true, xp: xpGain });
    launchConfetti();
    document.getElementById('xp-label').textContent = `${state.xp} XP total · ${state.totalCorrect} words mastered`;
  } else {
    card.className = 'word-card wrong';
    slots.forEach(s => s.classList.add('wrong-slot'));
    msg.className = 'result-msg wrong show';
    msg.textContent = `Not quite — try again! 💪`;
    sessionResults.push({ word, correct: false, xp: 0 });
    setTimeout(() => {
      card.className = 'word-card';
      slots.forEach(s => { s.classList.remove('wrong-slot'); s.classList.remove('correct-slot'); });
      msg.className = 'result-msg';
      clearAnswer();
    }, 1200);
    return;
  }

  nextBtn.className = 'next-btn show';
  nextBtn.textContent = currentIndex < sessionWords.length - 1 ? 'Next word →' : 'See my score! 🏆';
}

function nextWord() {
  currentIndex++;
  usedTileIndices = [];
  if (currentIndex >= sessionWords.length) {
    showScore();
  } else {
    loadWord();
    window.scrollTo(0,0);
  }
}

// ── SPEAK ──
function speakWord() {
  const word = sessionWords[currentIndex];
  if (!word) return;
  const btn = document.getElementById('speak-btn');
  btn.className = 'speak-btn speaking';
  btn.textContent = '🔊 Listening...';
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.rate = 0.85;
  utter.pitch = 1;
  utter.volume = 1;
  utter.onend = () => {
    btn.className = 'speak-btn';
    btn.textContent = '🔊 Hear the word again';
  };
  window.speechSynthesis.speak(utter);
}

// ── HINT ──
function showHint() {
  hintsUsed++;
  const word = sessionWords[currentIndex];
  const hint = document.getElementById('hint-display');
  // Show first letter as hint
  hint.textContent = `💡 Starts with: "${word[0].toUpperCase()}" — has ${word.length} letters`;
  hint.className = 'hint-display show';
}

// ── SCORE ──
function showScore() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-score').classList.add('active');
  const correct = sessionResults.filter(r => r.correct).length;
  const total = sessionResults.length;
  const xpEarned = sessionResults.reduce((s,r) => s+r.xp, 0);

  const emojis = ['😬','😅','🙂','😊','😄','🎉','🏆'];
  const pct = Math.round((correct/total)*100);
  document.getElementById('score-emoji').textContent = emojis[Math.floor((correct/total) * (emojis.length-1))];

  const titles = ['Keep practicing!','Getting there!','Nice work!','Really good!','Amazing!','Perfect round!'];
  document.getElementById('score-title').textContent = titles[Math.min(Math.floor((correct/total)*5), titles.length-1)];
  document.getElementById('score-subtitle').textContent = `${correct} out of ${total} correct · +${xpEarned} XP earned`;

  const breakdown = document.getElementById('score-breakdown');
  breakdown.innerHTML = sessionResults.map(r => `
    <div class="score-row">
      <span class="word">${r.word}</span>
      <span class="result">${r.correct ? '✅' : '❌'}</span>
    </div>
  `).join('');

  if (correct === total) launchConfetti();
  window.scrollTo(0,0);
}

// ── EDIT ──
function showEdit() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-edit').classList.add('active');
  renderWordInputs();
  window.scrollTo(0,0);
}

function renderWordInputs() {
  const list = document.getElementById('word-input-list');
  const words = state.words.length > 0 ? state.words : [''];
  list.innerHTML = words.map((w, i) => `
    <div class="word-input-row">
      <input type="text" value="${w}" placeholder="Word ${i+1}" id="word-input-${i}" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="del-btn" onclick="removeWordInput(${i})">✕</button>
    </div>
  `).join('');
}

function addWordInput() {
  const inputs = document.querySelectorAll('[id^="word-input-"]');
  if (inputs.length >= 15) return;
  state.words.push('');
  renderWordInputs();
  const last = document.querySelector('[id^="word-input-"]:last-of-type');
  if (last) last.focus();
}

function removeWordInput(i) {
  state.words.splice(i, 1);
  renderWordInputs();
}

function saveWords() {
  const inputs = document.querySelectorAll('[id^="word-input-"]');
  state.words = Array.from(inputs).map(i => i.value.trim().toLowerCase()).filter(w => w.length > 0);
  saveState();
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✅ Saved!';
  btn.style.background = '#059669';
  setTimeout(() => showHome(), 1000);
}

// ── CONFETTI ──
function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#2563EB','#FCD34D','#34D399','#F87171','#A78BFA','#F472B6'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.4}s`;
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.innerHTML = '', 4000);
}

// ── INIT ──
loadState();
showHome();
</script>
</body>
</html>
